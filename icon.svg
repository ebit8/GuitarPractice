<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#1a1d27"/>
  <!-- Guitar body -->
  <ellipse cx="256" cy="320" rx="100" ry="120" fill="#f97316" opacity="0.9"/>
  <ellipse cx="256" cy="320" rx="72" ry="88" fill="#1a1d27"/>
  <!-- Sound hole -->
  <circle cx="256" cy="320" r="38" fill="#0f1117" stroke="#f97316" stroke-width="4"/>
  <!-- Neck -->
  <rect x="238" y="100" width="36" height="210" rx="12" fill="#f97316" opacity="0.8"/>
  <!-- Nut -->
  <rect x="232" y="100" width="48" height="10" rx="4" fill="#f1f5f9"/>
  <!-- Headstock -->
  <rect x="228" y="60" width="56" height="50" rx="10" fill="#f97316" opacity="0.7"/>
  <!-- Tuning pegs -->
  <circle cx="232" cy="70" r="8" fill="#f1f5f9"/>
  <circle cx="232" cy="90" r="8" fill="#f1f5f9"/>
  <circle cx="280" cy="70" r="8" fill="#f1f5f9"/>
  <circle cx="280" cy="90" r="8" fill="#f1f5f9"/>
  <!-- Frets -->
  <rect x="238" y="145" width="36" height="4" rx="2" fill="#f1f5f9" opacity="0.6"/>
  <rect x="238" y="175" width="36" height="4" rx="2" fill="#f1f5f9" opacity="0.6"/>
  <rect x="238" y="205" width="36" height="4" rx="2" fill="#f1f5f9" opacity="0.6"/>
  <rect x="238" y="235" width="36" height="4" rx="2" fill="#f1f5f9" opacity="0.6"/>
  <!-- Strings -->
  <line x1="248" y1="108" x2="248" y2="300" stroke="#f1f5f9" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="108" x2="256" y2="300" stroke="#f1f5f9" stroke-width="1.5" opacity="0.5"/>
  <line x1="264" y1="108" x2="264" y2="300" stroke="#f1f5f9" stroke-width="1.5" opacity="0.5"/>
  <!-- Bridge -->
  <rect x="232" y="380" width="48" height="10" rx="4" fill="#f97316" opacity="0.8"/>
  <!-- Music note decoration -->
  <circle cx="390" cy="150" r="16" fill="#f97316" opacity="0.6"/>
  <rect x="404" y="116" width="5" height="38" rx="2" fill="#f97316" opacity="0.6"/>
</svg>
